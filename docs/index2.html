<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>水文データ取得ツール</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { background: #f4f6f9; }
    .card { border: none; box-shadow: 0 1px 6px rgba(0,0,0,.10); }
    #tbl td, #tbl th { white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container py-5" style="max-width:800px">

    <h1 class="h4 fw-bold mb-1">水文データ取得ツール</h1>
    <p class="text-secondary small mb-4">
      国土交通省「川の防災情報」から観測データを取得し、CSV形式でダウンロードします。
    </p>

    <!-- 入力フォーム -->
    <div class="card p-4 mb-4">
      <form id="form">
        <div class="mb-3">
          <label class="form-label fw-semibold">観測所ID</label>
          <input id="stationid" class="form-control font-monospace"
                 placeholder="例: 302111282214090" required />
        </div>
        <div class="row g-3 mb-4">
          <div class="col-sm-5">
            <label class="form-label fw-semibold">種別</label>
            <select id="kind" class="form-select">
              <option>水位</option>
              <option>流量</option>
              <option>雨量</option>
            </select>
          </div>
          <div class="col-sm-7">
            <label class="form-label fw-semibold">開始日</label>
            <input id="startTime" class="form-control" type="date" required />
            <div class="form-text">指定した月の1日からデータを取得します</div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary px-4">データ取得</button>
      </form>
    </div>

    <!-- ステータス -->
    <div id="status"></div>

    <!-- 結果 -->
    <div id="result" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="fw-semibold text-secondary small" id="resultLabel"></span>
        <button class="btn btn-success btn-sm" id="dlBtn">⬇ CSVダウンロード</button>
      </div>
      <div class="card p-3">
        <p class="text-secondary small mb-2" id="rowCount"></p>
        <div class="table-responsive">
          <table class="table table-sm table-bordered mb-0" id="tbl">
            <thead class="table-light" id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script>
  'use strict';


  let gCsvRows = [];
  let gFilename = '';

  // --- イベントリスナー ---

  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const stationid = document.getElementById('stationid').value.trim();
    const kind      = document.getElementById('kind').value;
    const startTime = document.getElementById('startTime').value; // YYYY-MM-DD

    showStatus('loading', 'データを取得中...');
    document.getElementById('result').classList.add('d-none');
    gCsvRows = [];

    try {
      gCsvRows = await fetchData(stationid, kind, startTime);
      const [yr, mo] = startTime.split('-');
      gFilename = `${stationid}_${kind}_${yr}-${mo}-01.csv`;
      renderResult(gCsvRows, stationid, kind, startTime);
      showStatus('', '');
    } catch (err) {
      showStatus('error', 'エラー: ' + err.message);
    }
  });

  document.getElementById('dlBtn').addEventListener('click', () => {
    if (!gCsvRows.length) return;
    // UTF-8 BOM付きCSV (Excel で文字化けしない)
    const csv  = '﻿' + gCsvRows.map(r => r.join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a    = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: gFilename,
    });
    document.body.appendChild(a);
    a.click();
    a.remove();
  });

  // --- データ取得・加工 ---

  async function fetchData(stationid, kind, startTime) {
    const kindMap = {
      '水位': ['DspWaterData.exe', 2],
      '流量': ['DspWaterData.exe', 6],
      '雨量': ['DspRainData.exe',  2],
    };
    if (!kindMap[kind]) throw new Error(`不明な種別: ${kind}`);
    const [DSP, ikind] = kindMap[kind];

    const [yr, mo] = startTime.split('-').map(Number);
    const strtime  = `${yr}${String(mo).padStart(2, '0')}01`;

    const target = `http://www1.river.go.jp/cgi-bin/${DSP}?KIND=${ikind}&ID=${stationid}&BGNDATE=${strtime}&ENDDATE=21001231&KAWABOU=NO`;

    // プロキシ経由でフェッチ (文字列として返る)
    const html = await fetchHtml(target);

    // HTMLパース → 2番目のtableを取得
    const doc    = new DOMParser().parseFromString(html, 'text/html');
    const tables = doc.querySelectorAll('table');
    if (tables.length < 2) {
      throw new Error('データテーブルが見つかりません。観測所IDを確認してください。');
    }

    // テーブル全行取得
    const getRows = tbl => [...tbl.querySelectorAll('tr')]
      .map(tr => [...tr.querySelectorAll('th,td')].map(c => c.textContent.trim()));

    // Pythonノートブックと同じ処理
    let rows = getRows(tables[1]).slice(1);        // rows = rows[1:]
    if (kind === '水位') rows = rows.slice(0, -1); // rows = rows[:-1]
    const val = rows.slice(1).map(r => r.slice(1)).flat(); // data flatten

    if (!val.length) throw new Error('データが空です。観測所IDと種別の組み合わせを確認してください。');

    // datetimeインデックスを生成 (year/month/01 01:00:00 から1時間刻み)
    const csvRows = [['', kind]]; // pandasのindex=Trueと同じ形式
    const originMs = Date.UTC(yr, mo - 1, 1, 1, 0, 0); // 決定論的な UTC 演算
    val.forEach((v, i) => {
      csvRows.push([toDatetimeStr(new Date(originMs + i * 3_600_000)), v]);
    });
    return csvRows;
  }

  async function fetchHtml(target) {
    const errors = [];

    // Proxy 1: allorigins.win — JSON API、サーバ側で文字コード変換済み
    try {
      const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(target));
      if (r.ok) {
        const data = await r.json();
        if (data.contents && data.contents.length > 100) return data.contents;
        errors.push('allorigins: レスポンスが空');
      } else {
        errors.push(`allorigins: HTTP ${r.status}`);
      }
    } catch (e) { errors.push('allorigins: ' + e.message); }

    // Proxy 2: corsproxy.io — URLはエンコードせずそのまま渡す
    try {
      const r = await fetch('https://corsproxy.io/?' + target);
      if (r.ok) {
        const buf = await r.arrayBuffer();
        return decodeBuffer(buf);
      }
      errors.push(`corsproxy.io: HTTP ${r.status}`);
    } catch (e) { errors.push('corsproxy.io: ' + e.message); }

    // ローカルファイルから開いている場合は専用メッセージ
    const hint = location.protocol === 'file:'
      ? 'ローカルファイルとして開いているためCORSエラーが発生します。<br>' +
        '<b>npx http-server</b> 等でローカルサーバを起動するか、GitHub Pagesに公開してください。'
      : 'CORSプロキシへのアクセスに失敗しました。しばらくして再試行してください。';
    throw new Error(hint + '<br><small class="text-muted">詳細: ' + errors.join(' / ') + '</small>');
  }

  function decodeBuffer(buf) {
    const peek    = new TextDecoder('utf-8', { fatal: false }).decode(new Uint8Array(buf, 0, 2048));
    const matched = peek.match(/charset=["']?([^"'\s;>]+)/i);
    const charset = matched ? matched[1] : 'shift-jis';
    try {
      return new TextDecoder(charset, { fatal: true }).decode(buf);
    } catch {
      return new TextDecoder('utf-8', { fatal: false }).decode(buf);
    }
  }

  function toDatetimeStr(d) {
    const pad = n => String(n).padStart(2, '0');
    return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:00:00`;
  }

  // --- UI更新 ---

  function renderResult(csvRows, stationid, kind, startTime) {
    document.getElementById('resultLabel').textContent =
      `${stationid} ／ ${kind} ／ ${startTime}`;
    document.getElementById('rowCount').textContent =
      `取得件数: ${csvRows.length - 1} 行（先頭10行を表示）`;

    document.getElementById('thead').innerHTML =
      '<tr>' + csvRows[0].map(h => `<th>${h || 'datetime'}</th>`).join('') + '</tr>';
    document.getElementById('tbody').innerHTML =
      csvRows.slice(1, 11).map(r =>
        '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>'
      ).join('');

    document.getElementById('result').classList.remove('d-none');
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    if (!type)            { el.innerHTML = ''; return; }
    if (type === 'loading') {
      el.innerHTML = `<div class="alert alert-info d-flex align-items-center gap-2 mb-4">
        <div class="spinner-border spinner-border-sm" role="status"></div>
        <span>${msg}</span></div>`;
    } else {
      el.innerHTML = `<div class="alert alert-danger mb-4" style="white-space:pre-line">${msg}</div>`;
    }
  }
  </script>
</body>
</html>
